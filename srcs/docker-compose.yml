services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    ports:
      - "3306:3306"
    env_file: .env
    volumes:
      - mariadb-data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    restart: on-failure
    networks:
      - inception
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    volumes:
      - wordpress-data:/var/www/html
    env_file: .env
    secrets:
      - db_password
      - credentials
    depends_on:
      - mariadb
    restart: on-failure
    networks:
      - inception
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}

  nginx:
    container_name: nginx
    build: ./requirements/nginx
    ports:
      - "443:443"
    volumes:
      - wordpress-data:/var/www/html
    env_file: .env
    depends_on:
      - wordpress
    restart: on-failure
    networks:
      - inception
    environment:
      - WP_HOST=${WP_HOST}


secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt


networks:
  inception:
    driver: bridge

volumes:
  mariadb-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jgils/data/mariadb

  wordpress-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jgils/data/wordpress
